                    - generic [ref=e84]: "好的，目标非常清晰！我们重新校准一下计划。 **核心调整：** - **当前体重**：63kg（比上次记录轻了2kg，可能是测量误差或体脂下降，但需确认） - **目标**：70kg（增重7kg） - **时间**：从现在到7月初（约6-7周） - **关键挑战**：时间紧，需要**快速且高效**的增肌策略。 **鉴于时间紧迫，你的记录维度需要更聚焦于“执行”和“反馈”：** ### 1. 饮食（每日必记，这是成败关键） - **热量目标**：**3200-3400 kcal/天**（比之前建议更高，因为时间紧且你体重更轻，需要更大热量盈余） - **蛋白质目标**：**140-150g/天**（每公斤体重2.2-2.4g） - **碳水目标**：**400-450g/天**（为高强度训练供能） - **脂肪目标**：**70-80g/天**（维持激素水平） - **水分**：**3.5L/天**（促进代谢和恢复） **记录格式**（简化版，每天只需记3个数字）： `日期 | 热量(kcal) | 蛋白质(g) | 碳水(g)` `5/21 | 3300 | 145 | 420` ### 2. 训练（每次训练后记，重点看“渐进负荷”） - **分化计划**：推荐 **“推/拉/腿”** 或 **“上肢/下肢”** 循环，每周每个部位训练2次。 - **动作**：只记 **3个核心复合动作**（深蹲、卧推、硬拉/划船）和 **1个辅助动作**（如推举、引体向上）。 - **负荷记录**：**重量 × 次数 × 组数**（如 `深蹲 75kg × 6次 × 4组`） - **关键指标**：**RPE**（主观疲劳度，1-10分，增肌建议7-9分）和 **是否完成目标次数**。 **记录格式**（每次训练后花1分钟）： `日期 | 分化 | 动作 | 负荷 | RPE | 完成目标？` `5/21 | 下肢 | 深蹲 | 75kg×6×4 | 8 | 是` `5/21 | 下肢 | 罗马尼亚硬拉 | 65kg×8×3 | 7 | 是` ### 3. 身体数据（每周一次，固定时间） - **体重**：每周一早晨空腹、排便后、穿同样衣物。 - **腰围**：肚脐水平，每周一测。 - **体脂/肌肉量**：如果你有体脂秤，可以记录，但**不要过度依赖**，更关注体重和腰围的变化趋势。 **记录格式**： `周次 | 体重(kg) | 腰围(cm)` `第1周 | 63.0 | 71` `第2周 | 64.2 | 72` ### 4. 恢复（每日主观评分，1分钟） - **睡眠时长**：目标 **8小时/晚** - **肌肉酸痛**：1-10分（1=无，10=无法活动） - **精力水平**：1-10分（1=极度疲劳，10=精力充沛） **记录格式**： `日期 | 睡眠(h) | 酸痛 | 精力` `5/21 | 7.5 | 4 | 6` ### 5. 每周复盘（每周末花10分钟） - **训练表现**：主项重量是否提升（如深蹲从75kg→80kg） - **体重变化**：本周增重多少（理想是 **0.5-1kg/周**） - **饮食依从性**：本周有多少天达到了热量和蛋白质目标（目标 **6/7天**） - **调整**：如果体重增长慢，下周长热量增加200kcal；如果训练疲劳，减少一组或降低RPE。 --- ### 你的初始行动清单（今天开始） 1. **饮食**：立即将每日热量目标设为 **3300 kcal**，蛋白质 **145g**。如果吃不下，用蛋白粉或牛奶补足。 2. **训练**：采用 **“推/拉/腿”** 分化，每周训练 **5-6天**（例如：周一推、周二拉、周三腿、周四推、周五拉、周六腿、周日休息）。 3. **记录**：从今天开始，用手机备忘录或Excel按上述格式记录饮食和训练。 4. **恢复**：强制自己 **23:00前睡觉**，保证8小时睡眠。 **关键提醒**：7周增重7kg（平均每周1kg）是**激进但可行**的目标，前提是**饮食必须严格执行**，训练必须**高强度且持续**。如果中途体重停滞超过1周，立即增加热量200-300kcal。 **现在告诉我**：你目前的训练频率和主要动作（如深蹲、卧推的当前重量）？以及你每天大概能摄入多少卡路里和蛋白质？我会据此细化你的计划。"
