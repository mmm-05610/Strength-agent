                    - generic [ref=e71]: "非常好的问题。作为你的教练，我建议你按以下 **5个核心维度** 来记录，每个维度只记最关键的指标，避免信息过载。 --- ### 1. 饮食（每日必记） - **热量**：实际摄入 vs 目标（当前建议 **2800-3000 kcal/天**，基于你65kg增肌需求） - **蛋白质**：实际克数 vs 目标（**130-140g/天**） - **碳水/脂肪**：只需记总量，不必细分（碳水建议 **350-400g**，脂肪 **60-70g**） - **水分**：是否达到 **3L/天** **记录格式示例**： `日期 | 热量(kcal) | 蛋白质(g) | 碳水(g) | 脂肪(g) | 水(L)` `5/20 | 2850 | 135 | 380 | 65 | 2.8` --- ### 2. 训练（每次训练后记） - **分化计划**：如“推/拉/腿”或“上下肢分化” - **动作**：只记主项（深蹲、卧推、硬拉、划船、推举） - **负荷**：重量 × 次数 × 组数（如 `深蹲 80kg × 6次 × 4组`） - **RPE（主观疲劳度）**：1-10分，记录每组最后1-2次的费力程度（增肌建议 **7-9分**） **记录格式示例**： `日期 | 分化 | 动作 | 负荷 | RPE` `5/20 | 下肢 | 深蹲 | 80kg×6×4 | 8` `5/20 | 下肢 | 罗马尼亚硬拉 | 70kg×8×3 | 7` --- ### 3. 身体数据（每周一次，固定时间） - **体重**：晨起空腹、排便后、穿同样衣物 - **体脂率**：用同一台设备（如体脂秤），记录趋势而非单次数值 - **肌肉量**：同上，关注变化方向 - **腰围**：肚脐水平，反映脂肪分布变化 **记录格式示例**： `周次 | 体重(kg) | 体脂(%) | 肌肉量(kg) | 腰围(cm)` `第1周 | 65.0 | 11.4 | 30.6 | 72` --- ### 4. 恢复（每日主观评分） - **睡眠**：时长 + 质量评分（1-10分） - **肌肉酸痛**：1-10分（1=无，10=无法活动） - **精力水平**：1-10分（1=极度疲劳，10=精力充沛） - **备注**：压力、生病、饮酒等 **记录格式示例**： `日期 | 睡眠(h)/质量 | 酸痛 | 精力 | 备注` `5/20 | 7.5/8 | 3 | 7 | 无` --- ### 5. 进度总结（每2-4周一次） - **训练表现**：主项重量是否提升（如深蹲从80kg→85kg） - **身体数据**：体重、体脂、肌肉量变化 - **饮食依从性**：达标天数比例 - **调整方向**：如“热量需增加200kcal”或“增加一组深蹲” --- ### 你的当前记录建议（基于你的目标） - **饮食**：热量目标 **2900 kcal**，蛋白质 **140g**，碳水 **380g**，脂肪 **65g** - **训练**：建议采用 **推/拉/腿** 或 **上下肢分化**，主项每周增加 **2.5-5kg** - **身体数据**：每周一早晨记录 - **恢复**：睡眠目标 **7.5h+**，精力评分 **7+** **下一步**：你可以从今天开始，用手机备忘录或Excel按上述格式记录。坚持2周后，我们复盘调整。需要我帮你设计一个初始训练分化计划吗？"
